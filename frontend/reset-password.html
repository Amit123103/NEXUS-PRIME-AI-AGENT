<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — NEXUS PRIME OMEGA AI AGENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    body {
      background: #050510;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .reset-card {
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
    }
    .reset-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .logo-accent { color: #00f0ff; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    .input-container { position: relative; }
    .input-container input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 15px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }
    .input-container input:focus {
      outline: none;
      border-color: #00f0ff;
      background: rgba(255, 255, 255, 0.05);
    }
    .reset-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00f0ff, #9d4edd);
      border: none;
      border-radius: 30px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 240, 255, 0.4);
    }
    .error { color: #ff4d4d; font-size: 0.85rem; margin-top: 10px; }
    .success { color: #00ff41; font-size: 0.85rem; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-logo">
      <span>⚡ NEXUS<span class="logo-accent">PRIME</span></span>
    </div>
    <h3>Set New Password</h3>
    <p style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 30px;">Enter your new password below.</p>
    
    <form id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <div class="input-container">
          <input type="password" id="newPassword" placeholder="Minimum 6 characters" required minlength="6">
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-container">
          <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
        </div>
      </div>
      <button type="submit" class="reset-btn" id="submitBtn">Update Password</button>
      <div id="resetMessage"></div>
    </form>
  </div>

  <script>
    const API = 'https://nexus-prime-omega.onrender.com';
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.body.innerHTML = '<div class="reset-card"><h3>Invalid Request</h3><p>Reset token is missing.</p><a href="/auth" style="color:#00f0ff; text-decoration:none;">Back to Login</a></div>';
    }

    const resetForm = document.getElementById('resetForm');
    const msgDiv = document.getElementById('resetMessage');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pwd !== confirm) {
        msgDiv.innerHTML = '<p class="error">Passwords do not match.</p>';
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        const res = await fetch(`${API}/api/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });

        const data = await res.json();
        if (res.ok) {
          msgDiv.innerHTML = `<p class="success">${data.message}</p><p style="margin-top:10px;"><a href="/auth" style="color:#00f0ff; text-decoration:none;">Go to Login</a></p>`;
          resetForm.style.display = 'none';
        } else {
          msgDiv.innerHTML = `<p class="error">${data.message}</p>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      } catch (err) {
        msgDiv.innerHTML = '<p class="error">Network error. Try again.</p>';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
