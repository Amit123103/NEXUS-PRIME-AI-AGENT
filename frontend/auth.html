<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS PRIME OMEGA — Sign In</title>
  <meta name="description" content="Sign in or create your NEXUS PRIME OMEGA account to access the superintelligent AI agent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div class="auth-container">
    <div class="auth-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">NEXUS<span class="logo-accent">PRIME</span> OMEGA</span>
      </div>

    <div class="auth-card" id="authCard">
      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin" id="tabSignIn">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tabSignUp">Sign Up</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- Error/Success messages -->
      <div class="auth-message" id="authMessage"></div>

      <!-- Sign In Form -->
      <form class="auth-form active" id="signinForm" autocomplete="on">
        <div class="form-group">
          <label for="loginInput">Email or Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="loginInput" name="login" placeholder="Enter email or username" required>
          </div>
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label for="loginPassword" style="margin-bottom: 0;">Password</label>
            <button type="button" class="forgot-link" id="forgotPwdLink">Forgot Password?</button>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" name="password" placeholder="Enter password" required>
            <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signinBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" id="signinLoader"></span>
        </button>
      </form>

      <!-- Forgot Password Form -->
      <form class="auth-form" id="forgotForm">
        <div class="form-header" style="text-align: center; margin-bottom: 25px;">
          <h3 style="font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);">Reset Password</h3>
          <p style="font-size: 0.85rem; color: var(--text-muted);">Enter your email to receive a reset link.</p>
        </div>
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" id="forgotEmail" name="email" placeholder="your@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="forgotBtn">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-loader" id="forgotLoader"></span>
        </button>
        <button type="button" class="back-link" id="backToLogin">Back to Sign In</button>
      </form>

      <!-- Sign Up Form -->
      <form class="auth-form" id="signupForm" autocomplete="on">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="fullName" name="fullName" placeholder="Your full name" required minlength="2" maxlength="50">
          </div>
          <span class="field-error" id="fullNameError"></span>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9]+">
          </div>
          <span class="field-error" id="usernameError"></span>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" id="signupEmail" name="email" placeholder="your@email.com" required>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" name="password" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="toggle-password" data-target="signupPassword" aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required>
            <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" id="signupLoader"></span>
        </button>
      </form>
    </div>

    <p class="auth-footer">
      Powered by <span class="gradient-text">NEXUS PRIME OMEGA AI AGENT</span>
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
